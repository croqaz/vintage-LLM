# Pre-training Configuration
# All paths are relative to the project root

[model]
# Pythia xxM
model_type = "gpt_neox"
vocab_size = 32768
hidden_size = 256          # embedding dimension
num_hidden_layers = 6      # transformer layers
num_attention_heads = 8    # attention heads (must divide hidden_size evenly)
intermediate_size = 1024   # FFN hidden size (typically 4x hidden_size)
max_position_embeddings = 2048
rotary_emb_base = 10000
rotary_pct = 0.25         # 25% of dims get RoPE

# [model]
# # LLaMA xxM
# model_type = "llama"
# vocab_size = 32768
# hidden_size = 256          # embedding dimension
# num_hidden_layers = 6      # transformer layers
# num_attention_heads = 8    # attention heads (must divide hidden_size evenly)
# num_key_value_heads = 8
# intermediate_size = 1024   # FFN hidden size (typically 4x hidden_size)
# max_position_embeddings = 2048

[data]
# Data files (supports glob patterns or lists of files)
train_files = ["training/train.bin"]  # or "train_*.bin" for multiple files
valid_files = ["training/valid.bin"]  # or ["valid_0.bin", "valid_1.bin"]

# Sequence length for each dataset sample
# Must be <= model.max_position_embeddings
max_seq_length = 2048

# Tokenizer (must match the one used to create .bin files)
tokenizer = "./tokenizers/t-v3/"

[training]
# Training duration
num_train_epochs = 2

# Output directories
output_dir = "training/checkpoints"
final_model_dir = "training/checkpoints/final"

# Batch sizes
# Effective batch size = num_devices × per_device_train_batch_size × gradient_accumulation_steps
per_device_train_batch_size = 8    # batch size per GPU
gradient_accumulation_steps = 4    # effective batch = 8 * 4 = 32
per_device_eval_batch_size = 16    # larger for eval (no gradients)

# Optimizer
optim = "adamw_torch_fused"        # fused CUDA AdamW (faster than default)

# Optimizer settings
learning_rate = 0.001
weight_decay = 0.1
adam_beta1 = 0.9
adam_beta2 = 0.95
max_grad_norm = 1.0

# Learning rate scheduler
lr_scheduler_type = "cosine_with_min_lr"  # cosine decay with non-zero floor
lr_scheduler_kwargs = { min_lr_rate = 0.05 }  # final LR = 5% of peak (avoids wasting final iterations at ~0 LR)
warmup_steps = 100                        # exact warmup steps

# Precision (choose based on your GPU)
bf16 = true                        # bfloat16 for Ampere+ GPUs (RTX 3090, A100, etc.)
fp16 = false                       # float16 for older GPUs (V100, T4, etc.)

# Compilation & memory
torch_compile = false               # torch.compile for faster training
gradient_checkpointing = true      # trade compute for memory (enables larger models)

# Checkpointing
save_strategy = "steps"
save_steps = 100                   # save checkpoint every X steps
save_total_limit = 4               # keep only X most recent checkpoints

# Evaluation
eval_strategy = "steps"
eval_steps = 100                   # evaluate every X steps

# Logging
logging_strategy = "steps"
logging_steps = 10                 # log every 10 steps
logging_first_step = true          # log the first step

# Performance
dataloader_num_workers = 4         # number of data loading threads
dataloader_pin_memory = true       # pin memory for faster GPU transfer
dataloader_prefetch_factor = 2     # batches prefetched per worker

# Reproducibility
seed = 42
