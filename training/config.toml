# Pre-training Configuration
# All paths are relative to the project root

model_config = "./configs/Llama-25m.toml"

[data]
# Data files (supports glob patterns or lists of files)
train_files = ["./train_*.bin"]
valid_files = ["./valid_*.bin"]

# Sequence length for each dataset sample
# Must be <= model.max_position_embeddings
max_seq_length = 2048

# Tokenizer (must match the one used to create .bin files)
tokenizer = "./tokenizers/t-v3/"

[training]
# Training duration
num_train_epochs = 1

# Optional: load weights from an existing checkpoint or model directory to
# continue training a base model rather than initialising from scratch.
# The architecture is still defined by the [model] config above; only the
# weights are loaded.  Comment out or remove to train from scratch.
# from_pretrained = "./checkpoints/final"

# Output directories
output_dir = "./checkpoints"
final_model_dir = "./checkpoints/final"

# Batch sizes
# Effective batch size = num_devices × per_device_train_batch_size × gradient_accumulation_steps
per_device_train_batch_size = 16   # batch size per GPU
per_device_eval_batch_size  = 16   # larger for eval (no gradients)
gradient_accumulation_steps = 4    # accumulate gradients over multiple mini-batches before updating the params

# Optimizer
optim = "adamw_torch_fused"        # fused CUDA AdamW (faster than default)

# Optimizer settings
learning_rate = 0.0005
weight_decay = 0.1
adam_beta1 = 0.9
adam_beta2 = 0.95
max_grad_norm = 1.0

# Learning rate scheduler
lr_scheduler_type    = "cosine_with_min_lr"    # cosine decay with non-zero floor
lr_scheduler_kwargs  = { min_lr_rate = 0.05 }  # final LR = 5% of peak (avoids wasting final iterations at ~0 LR)
warmup_steps = 200

# Precision (choose based on your GPU)
bf16 = true                        # bfloat16 for Ampere+ GPUs (RTX 3090, A100, etc.)
fp16 = false                       # float16 for older GPUs (V100, T4, etc.)

# Performance
torch_compile = true               # torch.compile for faster training
gradient_checkpointing = true      # trade compute for memory (enables larger models)
neftune_noise_alpha = 0.0          # add noise during training to improve model performance (fine-tuning)

# Checkpointing
save_strategy = "steps"
save_steps = 100                   # save checkpoint every X steps
save_total_limit = 3               # keep only X most recent checkpoints

# Evaluation
eval_strategy = "steps"
eval_steps = 100                   # evaluate every X steps

# Logging
logging_strategy = "steps"
logging_steps = 10                 # log every 10 steps
logging_first_step = true          # log the first step

# Performance
dataloader_num_workers = 2         # number of data loading threads
dataloader_prefetch_factor = 2     # batches prefetched per worker
dataloader_pin_memory = true       # pin memory for faster GPU transfer

# Reproducibility
seed = 42

[s3]
# Upload checkpoints to HuggingFace S3 bucket (optional)
# Requires HF_TOKEN to be set in the environment
# upload_steps must be a multiple of save_steps (uploads can only happen when a checkpoint exists)
# HF bucket ID, or full handle like: hf://buckets/username/my-bucket
bucket = "hf://buckets/croqaz/vintage-llm"
upload_steps = 100  # upload checkpoint every X steps
